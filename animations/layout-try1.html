<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fluid 3D Broken Grid Gallery (Local DB Version)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Diatype Semi Mono';
            src: url('../assets/font/ABCDiatypeSemi-Mono-Regular-Trial.woff') format('woff'),
        }

        @font-face {
            font-family: 'Diatype Mono';
            src: url('../assets/font/ABCDiatypeMono-Light-Trial.woff') format('woff'),
        }

        /* ==========================================
   1. 默认模式 (白底黑字)
   ========================================== */
        :root {
            --bg-color: #f2f2f2;
            /* 网页背景：纯白 */
            --fg-color: #000000;
            /* 文字和3D网格：纯黑 */
        }

        /* ==========================================
   2. 反转模式 (黑底白字)
   ========================================== */
        body.invert-mode {
            --bg-color: #000000;
            /* 网页背景：纯黑 */
            --fg-color: #ffffff;
            /* 文字和3D网格：纯白 */
        }

        /* ==========================================
   3. 应用变量
   ========================================== */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            transition: background-color 0.4s ease;
            /* 丝滑的背景切换 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }


        /* 1. DOM 画框层 */
        #dom-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;

        }

        /* 覆盖在每个图片层上方的独立 3D 画布 */
        .layer-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* 穿透点击 */
        }

        .art-frame {
            position: absolute;
            top: 0;
            left: 0;
            background-color: #fff;
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5);
            transform-origin: top left;
            /* 👇 恢复原样，把 overflow: hidden 删掉！让文字能露出来 */
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            will-change: width, height, transform;
        }

        /* 🌟 新增：专门用来“关住”图片的裁切层 */
        .img-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 🌟 溢出隐藏放在这里！只会裁切内部的图片 */
        }

        .art-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            mix-blend-mode: multiply;
            /* 🌟 微微放大，把黑边挤到 img-wrapper 外面去 */
            transform: scale(1.2);
            transform-origin: center;
        }

        .frame-info {
            position: absolute;
            top: calc(100% + 8px);
            left: 0px;
            font-family: 'Diatype Mono';
            font-size: 10px;
            line-height: 120%;
            color: var(--fg-color);
            transition: color 0.4s ease;
        }

        .is-focused .frame-info {
            top: calc(100% + 10px);
            font-size: 12px;
        }

        .frame-index-label {
            position: absolute;
            top: -15px;
            left: 0;
            width: 100%;
            font-size: 9px;
            font-family: 'Diatype Mono';
            pointer-events: none;
            color: var(--fg-color);
            transition: color 0.4s ease;
        }

        /* 2. WebGL 渲染层 */
        #rendererCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .bottom-text {
            position: fixed;
            z-index: 1000;
            color: #000;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .bottom-left-text {
            bottom: 30px;
            left: 40px;
            font-size: 14px;
            line-height: 1.4;
        }

        .bottom-right-text {
            bottom: 30px;
            right: 40px;
            font-size: 14px;
        }

        /* ==========================================
   按钮的极简重构
   ========================================== */
        .mode-switch-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;

            /* 去掉默认按钮的丑陋背景和边框 */
            background: transparent;
            border: none;
            cursor: pointer;

            /* 设定固定大小并居中图标 */
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;

            /* 🌟 核心：让 SVG 颜色自动跟随你的极简黑白变量！ */
            color: var(--fg-color);
            transition: color 0.4s ease;

            /* 去除点击时的蓝色轮廓 */
            outline: none;
            transition: color 0.4s ease,
                transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* ==========================================
   太阳和月亮的动画逻辑
   ========================================== */

        .mode-switch-btn svg {
            position: absolute;
            width: 24px;
            height: 24px;
            /* 赋予图标旋转、缩放、透明度的顺滑动画 */
            transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1),
                opacity 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* 🌙 默认模式 (白底)：显示月亮，隐藏太阳 */
        .icon-sun {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
            /* 太阳缩小并转到一边隐藏 */
        }

        .icon-moon {
            opacity: 1;
            transform: rotate(0) scale(1);
        }

        /* ☀️ 反转模式 (黑底)：显示太阳，隐藏月亮 */
        body.invert-mode .icon-sun {
            opacity: 1;
            transform: rotate(0) scale(1);
        }

        body.invert-mode .icon-moon {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
            /* 月亮缩小并转走 */
        }

        /* 鼠标悬停时给一点点放大交互感 */
        .mode-switch-btn:hover {
            transform: scale(1.1);
        }

        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            /* 圆点大小 */
            height: 20px;
            border-radius: 50%;
            background-color: white;
            /* 颜色可以根据你的背景调整 */
            pointer-events: none;
            /* 🌟 绝对不能删：让点击事件穿透圆点！ */
            z-index: 99999;
            /* 保证在最顶层 */

            /* 艺术馆常用高级特效：反色融合 (可选，如果不需要可以删掉) */
            mix-blend-mode: difference;

            /* 初始居中偏移也会在 JS 里处理，这里先不动 */
            will-change: transform;
            /* 开启 GPU 加速防卡顿 */
        }

        .gallery-backdrop {
            /* 铺满全屏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            /* 使用变量自动切换颜色 */
            background-color: var(--bg-color);

            /* 默认隐藏状态 */
            opacity: 0;
            pointer-events: none;
            /* 隐藏时，鼠标可以穿透它点击下面的东西 */

            /* 顺滑过渡动画 */
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);

            /* 性能优化 */
            will-change: opacity;
        }

        /* 激活状态 */
        .gallery-backdrop.is-active {
            opacity: 0.5;
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="dom-layer"></div>

    <div class="bottom-text bottom-left-text">
        FLUID 3D GRID & AUTONOMOUS SCALING<br>
        POWERED BY LOCAL MUSEUM DB
    </div>
    <div class="bottom-text bottom-right-text">(EXPERIMENTAL)</div>

    <button id="modeSwitcher" class="mode-switch-btn" aria-label="Toggle Mode">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="5"></circle>
            <g stroke="currentColor" stroke-width="1" stroke-linecap="round">
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </g>
        </svg>

        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="custom-cursor"></div>

    <script src="/assets/museumDB.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.125.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // ⚙️ 恢复你的全局配置与数据预加载逻辑
        // ==========================================
        const sequence = window.museumDB || [];
        const imageFolderPath = '/assets/museum_frames/';
        const loadedImages = {};
        let focusedItem = null; // 🌟 记录当前被放大的画框
        const matWhiteDS = new THREE.MeshBasicMaterial({ color: 0x000, side: THREE.DoubleSide });

        const backdropEl = document.createElement('div');
        // 预加载所有图片到内存
        sequence.forEach(item => {
            const img = new Image();
            img.src = imageFolderPath + item.name;
            loadedImages[item.name] = img;
        });

        // ⚙️ 8个独立方块的基础位置(vw/vh)和波动幅度
        const blocksConfig = [
            { baseL: 20, baseT: 25, ampL: 20, ampT: 25, zIndex: 10 },
            { baseL: 50, baseT: 15, ampL: 15, ampT: 15, zIndex: 5 },
            { baseL: 80, baseT: 25, ampL: 20, ampT: 20, zIndex: 5 },
            { baseL: 25, baseT: 50, ampL: 15, ampT: 15, zIndex: 6 },
            { baseL: 50, baseT: 45, ampL: 20, ampT: 20, zIndex: 1 },
            { baseL: 75, baseT: 55, ampL: 15, ampT: 15, zIndex: 6 },
            { baseL: 25, baseT: 75, ampL: 15, ampT: 15, zIndex: 7 },
            { baseL: 70, baseT: 75, ampL: 15, ampT: 15, zIndex: 2 }
        ];

        const frustumHeight = 30;
        const items = [];
        let scene, camera, renderer, boxGeo;


        function init() {
            if (sequence.length === 0) console.warn("⚠️ 找不到 window.museumDB");

            // 🌟 1. 创建“后台画板”，注意这里不把它加到 document.body 里！
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene = new THREE.Scene();
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(
                -frustumHeight * aspect / 2, frustumHeight * aspect / 2,
                frustumHeight / 2, -frustumHeight / 2, -100, 100
            );

            boxGeo = new THREE.BoxGeometry(2, 2, 2);
            const matWireframe = new THREE.MeshNormalMaterial({ wireframe: true, opacity: 0, transparent: true });
            const domLayer = document.getElementById('dom-layer');

            blocksConfig.forEach((conf, index) => {
                const mesh = new THREE.Mesh(boxGeo, matWireframe);
                scene.add(mesh);
                const helper = new THREE.BoxHelper(mesh, 0x000000);
                helper.material.transparent = true;
                helper.material.opacity = 0.5; // 调整这个值：0.1 到 0.3 之间看起来最“细”最精致
                mesh.add(helper);

                const stripsGroup = new THREE.Group();
                scene.add(stripsGroup);

                // --- DOM 图片层 ---
                const domEl = document.createElement('div');
                domEl.className = 'art-frame';

                // 🌟 新增：创建一个专门包裹 img 的裁切层
                const imgWrapper = document.createElement('div');
                imgWrapper.className = 'img-wrapper';

                const imgEl = document.createElement('img');
                const labelEl = document.createElement('div');
                labelEl.className = 'frame-info';

                // 🌟 改变嵌套关系：
                // 1. 先把图片放进裁切层
                imgWrapper.appendChild(imgEl);
                // 2. 把裁切层放进主画框
                domEl.appendChild(imgWrapper);
                // 3. 把文字标签放进主画框（和裁切层是平级兄弟，所以不会被裁掉！）
                domEl.appendChild(labelEl);

                domLayer.appendChild(domEl);

                // 🌟 2. 为每个方块创建一张专属的 2D Canvas，和图片放在同一个父级下
                const viewCanvas = document.createElement('canvas');
                viewCanvas.className = 'layer-canvas';
                viewCanvas.width = window.innerWidth * window.devicePixelRatio;
                viewCanvas.height = window.innerHeight * window.devicePixelRatio;
                domLayer.appendChild(viewCanvas);
                const ctx = viewCanvas.getContext('2d');

                const phaseX = Math.random() > 0.5 ? 0 : (Math.PI / 2);

                const data = {
                    conf: conf, mesh: mesh, stripsGroup: stripsGroup,
                    dom: domEl, img: imgEl, label: labelEl,
                    canvas: viewCanvas, ctx: ctx, // 存入专属画板

                    baseZ: (conf.zIndex - 5) * 5 + (Math.random() - 0.5) * 10,
                    offsetZ: Math.random() * Math.PI * 2,

                    currentRatio: 1, lastImageName: '',
                    offsetX: Math.random() * Math.PI * 2, offsetY: Math.random() * Math.PI * 2,
                    scaleOffX: Math.random() * Math.PI * 2, scaleOffY: Math.random() * Math.PI * 2,
                    rotOffX: phaseX, rotOffY: Math.random() > 0.5 ? 0 : (Math.PI / 2),
                    scaleBase: index === 4 ? 4.5 : (Math.random() * 1.5 + 2),
                    speedScale: Math.random() * 0.5 + 0.5,

                    helper: helper
                };
                items.push(data);
            });
            // ==========================================
            // 🌟 新增：在遍历 items 之前，先创建遮罩层并插入到 body
            // ==========================================

            backdropEl.className = 'gallery-backdrop';
            domLayer.appendChild(backdropEl);

            // 封装一个退出焦点的函数，方便复用
            const closeAllFocus = () => {
                focusedItem = null;
                backdropEl.classList.remove('is-active'); // 隐藏背景遮罩
                items.forEach(i => {
                    i.dom.classList.remove('is-focused');
                    const infoEl = i.dom.querySelector('.frame-info');
                    if (infoEl) infoEl.style.width = ''; // 退出时解除宽度锁定，恢复排版
                });
            };

            // 🌟 新增：点击背景遮罩层时，直接退出聚焦状态
            backdropEl.addEventListener('click', closeAllFocus);


            // ==========================================
            // 原本的遍历与点击逻辑（融入遮罩控制）
            // ==========================================
            items.forEach((item) => {
                item.dom.style.cursor = 'pointer';

                item.dom.addEventListener('click', (e) => {
                    // 🌟 重要：阻止事件冒泡，防止点击画框时误触到背景的点击事件
                    e.stopPropagation();

                    const isClosing = (focusedItem === item);

                    // 1. 🌟 在切换焦点之前，先把所有画框的缩小状态清空，并恢复默认宽度
                    items.forEach(i => {
                        i.dom.classList.remove('is-focused');
                        const el = i.dom.querySelector('.frame-info');
                        if (el) el.style.width = '';
                    });

                    // 2. 切换焦点：如果已经是它，就取消(null)，否则设为它
                    focusedItem = isClosing ? null : item;

                    const infoEl = item.dom.querySelector('.frame-info');

                    // 3. 🌟 根据状态更新画框和遮罩层
                    if (focusedItem) {
                        focusedItem.dom.classList.add('is-focused');

                        backdropEl.classList.add('is-active'); // 🌟 显示遮罩层

                        if (infoEl) {
                            // ==========================================
                            // 🌟 纯 2D 降维打击：直接用屏幕像素算，绕开 frustumW！
                            // ==========================================
                            const minScreenEdge = Math.min(window.innerWidth, window.innerHeight);
                            const maxTargetPixels = minScreenEdge * 0.8;

                            let imgRatio = 1;
                            if (item.img && item.img.naturalWidth > 0) {
                                imgRatio = item.img.naturalWidth / item.img.naturalHeight;
                            }

                            const finalPixelW = (imgRatio >= 1) ? maxTargetPixels : (maxTargetPixels * imgRatio);
                            const currentPixelW = item.dom.offsetWidth - 20;
                            const startScale = currentPixelW / finalPixelW;

                            // 锁定最终宽度
                            infoEl.style.width = finalPixelW + 'px';
                            // 如果你之前在用 JS 每一帧算 scale，需要保留下面这行供 render 循环使用：
                            item.textStartScale = startScale;
                        }
                    } else {
                        // 🌟 如果取消了焦点，隐藏遮罩层
                        backdropEl.classList.remove('is-active');
                    }
                });
            });
            const modeBtn = document.getElementById('modeSwitcher');

            if (modeBtn) {
                modeBtn.addEventListener('click', () => {
                    // 1. 切换 HTML/CSS 模式 (反转网页背景色和文字颜色)
                    document.body.classList.toggle('invert-mode');

                    // 2. 判断当前是否处于黑底模式
                    const isInvert = document.body.classList.contains('invert-mode');

                    // 3. 设定对应的 Three.js 线条颜色 (十六进制)
                    // 默认白底是黑线 (0x000000)，反转黑底是白线 (0xffffff)
                    const newHexColor = isInvert ? 0xffffff : 0x000000;
                    matWhiteDS.color.setHex(newHexColor);

                    // 4. 遍历所有画框，瞬间更新所有 3D 线条的颜色！
                    items.forEach(item => {
                        if (item.helper) {
                            item.helper.material.color.setHex(newHexColor);
                        }
                    });
                });
            }

            window.addEventListener('resize', onWindowResize);
            requestAnimationFrame(animate);
            // startMatchingTimer(1000);
        }

        function lockFrameInfoWidths() {
            const allArtFrames = document.querySelectorAll('.art-frame');
            const allFrameInfos = document.querySelectorAll('.frame-info');

            // 可以在控制台打印一下，看看究竟找到了几个框
            console.log(`🔍 尝试锁定宽度：找到了 ${allArtFrames.length} 个 art-frame`);

            allArtFrames.forEach((frame, index) => {
                if (allFrameInfos[index]) {
                    const exactWidth = frame.getBoundingClientRect().width;
                    console.log(`第 ${index + 1} 个框的宽度是:`, exactWidth);

                    // 只要宽度正常，就强制赋值
                    if (exactWidth > 10) {
                        allFrameInfos[index].style.width = exactWidth + 'px';
                    }
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = performance.now() * 0.001;
            const aspect = window.innerWidth / window.innerHeight;
            const frustumW = frustumHeight * aspect;
            const camTop = frustumHeight / 2;
            const camLeft = -frustumW / 2;
            const w = (Math.PI * 2) / 16;

            // 第一步：计算所有位置和层级
            items.forEach((item) => {
                // ==========================================
                // 1. 【后台计算：原本的游荡轨迹】（不直接赋给 mesh）
                // ==========================================
                const wanderScaleX = (item.scaleBase * 1.2) + Math.sin(t * w * 4 * item.speedScale + item.scaleOffX) * (item.scaleBase * 0.6);
                const wanderScaleY = (item.scaleBase * 1) + Math.cos(t * w * 2 * item.speedScale + item.scaleOffY) * (item.scaleBase * 0.5);
                const wanderScaleZ = (item.scaleBase * 0.7) + Math.sin(t * w * 3 * item.speedScale + item.scaleOffX) * (item.scaleBase * 0.1);

                const maxRadiusWorld = Math.sqrt(
                    Math.pow(wanderScaleX, 2) + Math.pow(wanderScaleY, 2) + Math.pow(wanderScaleZ, 2)
                );
                const safeHalfW = (maxRadiusWorld / frustumW) * 100 + 4;
                const safeHalfH = (maxRadiusWorld / frustumHeight) * 100 + 4;

                let targetMinVw = Math.max(safeHalfW, item.conf.baseL - item.conf.ampL);
                let targetMaxVw = Math.min(100 - safeHalfW, item.conf.baseL + item.conf.ampL);
                if (targetMinVw > targetMaxVw) targetMinVw = targetMaxVw = (targetMinVw + targetMaxVw) / 2;

                const actualBaseL = (targetMinVw + targetMaxVw) / 2;
                const actualAmpL = (targetMaxVw - targetMinVw) / 2;
                const wanderVw = actualBaseL + Math.sin(t * 0.5 + item.offsetX) * actualAmpL;

                let targetMinVh = Math.max(safeHalfH, item.conf.baseT - item.conf.ampT);
                let targetMaxVh = Math.min(100 - safeHalfH, item.conf.baseT + item.conf.ampT);
                if (targetMinVh > targetMaxVh) targetMinVh = targetMaxVh = (targetMinVh + targetMaxVh) / 2;

                const actualBaseT = (targetMinVh + targetMaxVh) / 2;
                const actualAmpT = (targetMaxVh - targetMinVh) / 2;
                const wanderVh = actualBaseT + Math.cos(t * 0.6 + item.offsetY) * actualAmpT;

                const wanderZ = item.baseZ + Math.sin(t * 0.4 + item.offsetZ) * 15;

                const rawX = Math.sin(t * w * 2 + item.rotOffX);
                const rawY = Math.sin(t * w * 1 + item.rotOffY);
                const shapeX = Math.sign(rawX) * Math.pow(Math.abs(rawX), 0.6);
                const shapeY = Math.sign(rawY) * Math.pow(Math.abs(rawY), 0.6);
                const wanderRotX = shapeX * 0.6;
                const wanderRotY = shapeY * 0.6;

                // ==========================================
                // 2. 【设定目标】：不再直接设透明度，而是设一个“聚焦进度”
                // ==========================================
                let targetState = {
                    sX: wanderScaleX, sY: wanderScaleY, sZ: wanderScaleZ,
                    vw: wanderVw, vh: wanderVh, z: wanderZ,
                    rX: wanderRotX, rY: wanderRotY,
                    focusP: 0.0 // 🌟 0 代表完全游荡，1 代表完全聚焦放大
                };

                if (focusedItem === item) {
                    let imgRatio = 1;
                    if (item.img && item.img.naturalWidth > 0) {
                        imgRatio = item.img.naturalWidth / item.img.naturalHeight;
                    }
                    const screenMinEdge = Math.min(frustumW, frustumHeight);
                    const absoluteMaxScale = (screenMinEdge * 0.8) / 2;

                    if (imgRatio >= 1) {
                        targetState.sX = absoluteMaxScale;
                        targetState.sY = absoluteMaxScale / imgRatio;
                    } else {
                        targetState.sX = absoluteMaxScale * imgRatio;
                        targetState.sY = absoluteMaxScale;
                    }

                    targetState.sZ = item.scaleBase * 0.1;
                    targetState.vw = 50;
                    targetState.vh = 50;
                    targetState.z = 40;
                    targetState.rX = 0;
                    targetState.rY = 0;

                    targetState.focusP = 1.0; // 🌟 目标：进度推到 100%
                }

                // ==========================================
                // 3. 【动画平滑过渡】：让进度值平滑过渡
                // ==========================================
                if (!item.animState) {
                    item.animState = { ...targetState, focusP: 0.0 };
                } else {
                    const ease = 0.2;
                    item.animState.sX += (targetState.sX - item.animState.sX) * ease;
                    item.animState.sY += (targetState.sY - item.animState.sY) * ease;
                    item.animState.sZ += (targetState.sZ - item.animState.sZ) * ease;
                    item.animState.vw += (targetState.vw - item.animState.vw) * ease;
                    item.animState.vh += (targetState.vh - item.animState.vh) * ease;
                    item.animState.z += (targetState.z - item.animState.z) * ease;
                    item.animState.rX += (targetState.rX - item.animState.rX) * ease;
                    item.animState.rY += (targetState.rY - item.animState.rY) * ease;

                    // 🌟 核心：进度值的平滑跟随
                    item.animState.focusP += (targetState.focusP - item.animState.focusP) * ease;
                }

                // ==========================================
                // 4. 【应用到 3D/DOM 世界】与 🌟 终极透明度数学映射
                // ==========================================
                item.mesh.scale.set(item.animState.sX, item.animState.sY, item.animState.sZ);
                item.mesh.rotation.set(item.animState.rX, item.animState.rY, 0);
                item.mesh.position.set(
                    camLeft + (item.animState.vw / 100) * frustumW,
                    camTop - (item.animState.vh / 100) * frustumHeight,
                    item.animState.z
                );

                // 🌟 数学映射魔法：
                // focusP (0 到 1) 乘以 2，等于 0 到 2。
                // 1.0 减去它，意味着当 focusP 刚到达 0.5 时，计算结果就已经是 0 了！
                let currentOpacity = 1.0 - (item.animState.focusP * 2.0);

                // 强制将结果限制在 0 到 1 之间（避免出现负数导致 CSS 报错）
                currentOpacity = Math.max(0, Math.min(1, currentOpacity));

                item.canvas.style.opacity = currentOpacity;
                item.currentZ = item.animState.z;


                // ==========================================
                // 5. 【切图逻辑】：仅在没有放大的时候切图
                // ==========================================
                const currentSignX = Math.sign(rawX);
                const angleArgX = t * w * 2 + item.rotOffX;
                const speedX = Math.cos(angleArgX);
                const currentSpeedSignX = Math.sign(speedX);

                if (focusedItem !== item) {
                    if (item.prevSignX !== undefined && item.prevSignX !== currentSignX) {
                        updateItemContent(item);
                    }
                    if (item.prevSpeedSignX !== undefined && item.prevSpeedSignX !== currentSpeedSignX) {
                        updateItemContent(item);
                    }
                }
                item.prevSignX = currentSignX;
                item.prevSpeedSignX = currentSpeedSignX;


                // ==========================================
                // 6. 【DOM 追踪逻辑】（原汁原味，不需要动！）
                // ==========================================
                item.mesh.updateMatrixWorld();
                const box3D = new THREE.Box3().setFromObject(item.mesh);
                const worldW = box3D.max.x - box3D.min.x;
                const worldH = box3D.max.y - box3D.min.y;
                item.currentRatio = worldW / worldH;

                const pixelW = (worldW / frustumW) * window.innerWidth;
                const pixelH = (worldH / frustumHeight) * window.innerHeight;
                const pixelLeft = ((box3D.min.x - camLeft) / frustumW) * window.innerWidth;
                const pixelTop = ((camTop - box3D.max.y) / frustumHeight) * window.innerHeight;

                const padding = 20;
                // 🌟 优化 1：抹除疯狂的极小浮点数，减轻浏览器 Layout 压力
                const finalW = Math.round(pixelW + padding);
                const finalH = Math.round(pixelH + padding);
                const finalX = (pixelLeft - padding / 2).toFixed(1); // 坐标保留一位小数足够了
                const finalY = (pixelTop - padding / 2).toFixed(1);

                item.dom.style.width = `${finalW}px`;
                item.dom.style.height = `${finalH}px`;

                // 🌟 优化 2：【最关键】把 translate 换成 translate3d！
                // 这会强制浏览器把这个 DOM 元素丢给独立显卡（GPU）的图层去渲染，避开 CPU 瓶颈！
                item.dom.style.transform = `translate3d(${finalX}px, ${finalY}px, 0)`;

                rebuildStrips(item);
            });

            // 🌟 新增核心逻辑：严格按照 currentZ 远近排序，赋予绝对不重复的 z-index
            const sortedItems = [...items].sort((a, b) => {
                // 如果 a 是焦点，a 永远比 b 大（排在最后面，获得最高 z-index）
                if (a === focusedItem) return 1;
                // 如果 b 是焦点，b 永远比 a 大
                if (b === focusedItem) return -1;

                // 其他普通画框，依然按照它们真实的物理远近来排序
                return a.currentZ - b.currentZ;
            });

            sortedItems.forEach((item, index) => {
                // 最远的 index 是 0 (zIndex: 10, 11)
                // 最近的 index 是 7 (zIndex: 80, 81)
                const strictZIndexBase = (index + 1) * 10;

                item.dom.style.zIndex = strictZIndexBase;
                item.canvas.style.zIndex = strictZIndexBase + 1;

                if (item === focusedItem) {
                    // 聚焦画框是 80，遮罩层就是 79。
                    // 而其他最前面的普通画框最多只有 70，完美隔开！
                    backdropEl.style.zIndex = strictZIndexBase - 1;
                }
            });

            // 🌟 第二步：分层独立渲染！
            items.forEach((item) => {
                // 1. 先把所有别的 3D 框隐藏，确保舞台上只有这一个方块
                items.forEach(other => {
                    other.mesh.visible = false;
                    other.stripsGroup.visible = false;
                });

                // 2. 只显示当前这一个方块
                item.mesh.visible = true;
                item.stripsGroup.visible = true;

                // 3. 渲染到我们那张“看不见”的 WebGL 后台画板上
                renderer.render(scene, camera);

                // 4. 将画好的结果“复印”到当前方块专属的 2D Canvas 上
                item.ctx.clearRect(0, 0, item.canvas.width, item.canvas.height);
                item.ctx.drawImage(renderer.domElement, 0, 0);
            });
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -frustumHeight * aspect / 2;
            camera.right = frustumHeight * aspect / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

            // 🌟 窗口变化时，同步更新所有的专属画布大小
            items.forEach(item => {
                item.canvas.width = window.innerWidth * window.devicePixelRatio;
                item.canvas.height = window.innerHeight * window.devicePixelRatio;
            });
        }
        // 🌟 智能+随机匹配机制：解决重复图片问题
        function updateItemContent(item) {
            if (sequence.length === 0) return;

            // 1. 获取当前屏幕上【所有画框】正在显示的图片名字集合
            // 这样可以防止画框 A 和画框 B 同时显示同一张图
            const inUseNames = new Set(items.map(i => i.lastImageName).filter(Boolean));

            // 2. 计算数据库中所有画作与当前画框的比例差距
            const candidates = sequence.map(art => {
                return {
                    artData: art,
                    diff: Math.abs(art.ratioVal - item.currentRatio)
                };
            });

            // 3. 过滤掉屏幕上正在显示的画作，并按差距从小到大（最匹配到最不匹配）排序
            const availableCandidates = candidates
                .filter(c => !inUseNames.has(c.artData.name))
                .sort((a, b) => a.diff - b.diff);

            if (availableCandidates.length === 0) return; // 极端情况防爆

            // 4. 🌟 核心魔法：不要每次都拿第 1 名！
            // 我们从最匹配的【前 8 名】里随机抽选一张。
            // 这不仅保证了比例看着舒服，还能让每次翻面都有开盲盒的新鲜感！
            const poolSize = Math.min(8, availableCandidates.length);
            const randomIndex = Math.floor(Math.random() * poolSize);
            const chosenArt = availableCandidates[randomIndex].artData;

            // 5. 瞬间替换图片和文字
            if (chosenArt.name !== item.lastImageName) {
                item.img.src = loadedImages[chosenArt.name] ? loadedImages[chosenArt.name].src : (imageFolderPath + chosenArt.name);
                // 1. 提取三个核心信息（title 拿不到就用 name 兜底）
                const artist = chosenArt.artistDisplayName;
                const title = chosenArt.title || chosenArt.name;
                const year = chosenArt.objectEndDate;

                // 2. 🌟 核心魔法：把它们装进数组，过滤掉不存在的值，最后用 ", " 完美串联
                item.label.innerText = [artist, title, year].filter(Boolean).join(', ');
                item.lastImageName = chosenArt.name;

                // ==========================================
                // 🌟 新增：动态更新顶部的 [当前编号 / 总数] 标签
                // ==========================================
                // A. 在原始的 sequence 数组中反查出这个作品的真实原始索引
                const originalIndex = sequence.findIndex(art => art.name === chosenArt.name);

                // 索引从 0 开始所以要 +1。防爆处理：万一没找到就用 1
                const currentNumber = originalIndex !== -1 ? (originalIndex + 1) : 1;
                const totalCount = sequence.length;

                // B. 找一下画框里有没有这个标签 DOM，如果没有就现场造一个
                let indexLabelEl = item.dom.querySelector('.frame-index-label');
                if (!indexLabelEl) {
                    indexLabelEl = document.createElement('div');
                    indexLabelEl.className = 'frame-index-label';
                    item.dom.appendChild(indexLabelEl); // 塞到画框 DOM 里
                }

                // C. 强迫症排版福利：根据总数的位数自动补零！
                // 比如总数是 500 (3位数)，那么 4 就变成 004，45 就变成 045
                const padLen = String(totalCount).length;
                const formattedNum = String(currentNumber).padStart(padLen, '0');

                // D. 写入标签内容
                indexLabelEl.innerText = `[${formattedNum} / ${totalCount}]`;
            }


            lockFrameInfoWidths();

        }

        // 🎨 辅助绘图逻辑
        // 🌟 1. 原汁原味的 2D 投影宽度补偿算法
        function getOrthographicScale(pStartWorld, pEndWorld, dirWorld, targetHeight) {
            const dx = pEndWorld.x - pStartWorld.x;
            const dy = pEndWorld.y - pStartWorld.y;
            const length2D = Math.sqrt(dx * dx + dy * dy);

            if (length2D < 0.0001) return 0;

            const cross2D = Math.abs(dx * dirWorld.y - dy * dirWorld.x);
            if (cross2D < 0.0001) return targetHeight;

            return (targetHeight * length2D) / cross2D;
        }

        // 🌟 2. 完美适配 8 个独立方块的 rebuildStrips 函数（包含防爆机制）
        function rebuildStrips(item) {
            const kGroup = item.stripsGroup;
            const mesh = item.mesh;

            while (kGroup.children.length > 0) {
                const m = kGroup.children[0];
                if (m.geometry) m.geometry.dispose();
                kGroup.remove(m);
            }

            mesh.updateMatrixWorld(true);

            // 设定想要的线条像素宽度
            const strokePx = 6;
            const absoluteStroke = strokePx * (frustumHeight / window.innerHeight);

            // 提取顶点 
            const v1 = worldVertex(boxGeo, 1, mesh);
            const v2 = worldVertex(boxGeo, 2, mesh);
            const v5 = worldVertex(boxGeo, 5, mesh);
            const v7 = worldVertex(boxGeo, 7, mesh);

            const vMid57 = v5.clone().add(v7).multiplyScalar(0.5);
            const vS3End = vMid57.clone().lerp(v1, 0.2);

            const axisXWorld = new THREE.Vector3().setFromMatrixColumn(mesh.matrixWorld, 0);
            const axisYWorld = new THREE.Vector3().setFromMatrixColumn(mesh.matrixWorld, 1);

            // ⚠️ 注意这里：将 const 改成了 let，因为后面我们要对它们重新赋值
            let scaleS1 = getOrthographicScale(v5, v7, axisXWorld, absoluteStroke);
            let scaleS2 = getOrthographicScale(v1, vMid57, axisYWorld, absoluteStroke);
            let scaleS3 = getOrthographicScale(v2, vS3End, axisYWorld, absoluteStroke);

            // ==========================================
            // 🚀 【核心防爆机制】自动追踪与极限值拦截
            // ==========================================
            const MULTIPLIER_S1 = 1.5;
            const MULTIPLIER_S2 = 1.5;
            const MULTIPLIER_S3 = 1.5;

            // W 代表当前方块的物理基准最大尺寸 (基础尺寸 2 * 当前最大缩放比例)
            // 这保证了方块变大时，爆炸极限也跟着合理放大
            const W = Math.max(mesh.scale.x, mesh.scale.y) * 2;

            function applyAntiExplosion(scale, multiplier) {
                const limit = W * multiplier;

                // 如果 scale 爆炸（无效或超过个体上限）
                if (!Number.isFinite(scale) || Math.abs(scale) > limit) {
                    return limit; // 触发防爆，直接锁定在该个体的最大上限
                }
                return Math.abs(scale); // 安全区间
            }

            // 🚀 分别传入各自的倍数进行过滤，并重新赋值
            scaleS1 = applyAntiExplosion(scaleS1, MULTIPLIER_S1);
            scaleS2 = applyAntiExplosion(scaleS2, MULTIPLIER_S2);
            scaleS3 = applyAntiExplosion(scaleS3, MULTIPLIER_S3);
            // ==========================================

            const offsetS1 = axisXWorld.clone().multiplyScalar(scaleS1);
            const offsetS2 = axisYWorld.clone().multiplyScalar(-scaleS2);
            const offsetS3 = axisYWorld.clone().multiplyScalar(scaleS3);

            const s1 = makeStrip(v5, v7, offsetS1, matWhiteDS);
            const s2 = makeStrip(v1, vMid57, offsetS2, matWhiteDS);
            const s3 = makeCenteredStrip(v2, vS3End, offsetS3, matWhiteDS);

            kGroup.add(s1, s2, s3);
        }
        function worldVertex(g, i, m) { return new THREE.Vector3().fromBufferAttribute(g.attributes.position, i).applyMatrix4(m.matrixWorld); }
        function makeQuad(p0, p1, p2, p3, mat) {
            const g = new THREE.BufferGeometry().setFromPoints([p0, p1, p2, p3]); g.setIndex([0, 1, 2, 0, 2, 3]); return new THREE.Mesh(g, mat);
        }

        function makeStrip(A, B, offset, mat) { return makeQuad(A, B, B.clone().add(offset), A.clone().add(offset), mat); }
        function makeCenteredStrip(A, B, offset, mat) { return makeQuad(A, A.clone().add(offset), B, B.clone().sub(offset), mat); }
        function getAbsR01(o) {
            const m = new THREE.Matrix4().makeRotationFromQuaternion(o.getWorldQuaternion(new THREE.Quaternion())).elements;
            return { a00: Math.abs(m[0]), a01: Math.abs(m[4]), a10: Math.abs(m[1]), a11: Math.abs(m[5]) };
        }

        // ==========================================
        // 艺术馆级：鼠标平滑跟随效果
        // ==========================================
        const cursorEl = document.querySelector('.custom-cursor');

        // 鼠标真实的物理位置
        let targetMouseX = window.innerWidth / 2;
        let targetMouseY = window.innerHeight / 2;

        // 圆点当前所在的位置（通过缓动逐渐靠近真实位置）
        let currentCursorX = window.innerWidth / 2;
        let currentCursorY = window.innerHeight / 2;

        // 1. 监听真实的鼠标移动
        window.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        // 2. 独立的小渲染循环（也可以合并到你 Three.js 的循环里）
        function updateCursor() {
            // 🌟 熟悉的配方：缓动系数 ease (0.15 比较顺滑，值越小延迟感越重)
            const ease = 0.2;

            currentCursorX += (targetMouseX - currentCursorX) * ease;
            currentCursorY += (targetMouseY - currentCursorY) * ease;

            // 🌟 优化：用 translate3d 开启硬件加速，减去宽高的那一半让圆心对准鼠标尖端
            cursorEl.style.transform = `translate3d(${currentCursorX - 12}px, ${currentCursorY - 12}px, 0)`;

            requestAnimationFrame(updateCursor);
        }

        // 启动循环
        updateCursor();

        init();
    </script>
</body>
